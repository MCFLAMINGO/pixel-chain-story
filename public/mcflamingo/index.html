<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0;url=https://www.mcflamingo.com/" />
    <title>McFlamingo — Continuity booth</title>
    <style>
      :root {
        --ink: #1a1410;
        --sand: #f3e6d4;
        --coral: #f4816f;
        --green: #8fc1a6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Quicksand, "Iowan Old Style", Georgia, serif;
        color: var(--ink);
        background:
          radial-gradient(
            ellipse 70% 50% at 10% 0%,
            color-mix(in srgb, var(--coral) 35%, white),
            transparent 55%
          ),
          radial-gradient(
            ellipse 60% 45% at 100% 100%,
            color-mix(in srgb, var(--green) 40%, white),
            transparent 50%
          ),
          var(--sand);
        padding: 2rem;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 7vw, 2.8rem);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1.25rem;
        line-height: 1.45;
        opacity: 0.85;
      }
      a.cta {
        display: inline-block;
        padding: 0.9rem 1.25rem;
        background: var(--coral);
        color: #fff8f0;
        text-decoration: none;
        font-weight: 700;
      }
      .meta {
        margin-top: 1.75rem;
        font-size: 0.8rem;
        opacity: 0.65;
        line-height: 1.4;
      }
      .meta a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>McFlamingo</h1>
      <p>
        Continuity booth — humans go to the real restaurant site. Pixel holds the homepage digest
        map; this page is not a fake menu.
      </p>
      <a class="cta" href="https://www.mcflamingo.com/">Open www.mcflamingo.com</a>
      <p class="meta">
        Order:
        <a href="https://www.mcflamingo.com/popmenu-order">/popmenu-order</a>
        · Lab snapshot for digest:
        <a href="/mcflamingo/homepage-snapshot.html">homepage-snapshot.html</a>
      </p>
    </main>
    <script>
      // Prefer instant navigation; meta refresh is the no-JS fallback.
      location.replace("https://www.mcflamingo.com/");
    </script>
  </body>
</html>
