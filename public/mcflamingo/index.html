<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0;url=https://www.mcflamingo.com/menu" />
    <title>McFlamingo → live menu</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Quicksand, Georgia, serif;
        background: #f3e6d4;
        color: #1a1410;
        padding: 2rem;
        text-align: center;
      }
      a {
        display: inline-block;
        margin: 0.4rem;
        padding: 0.85rem 1.2rem;
        background: #f4816f;
        color: #fff8f0;
        text-decoration: none;
        font-weight: 700;
      }
      .ghost {
        background: transparent;
        color: #1a1410;
        border: 1px solid #1a1410;
      }
      p {
        max-width: 28rem;
        line-height: 1.4;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>McFlamingo</h1>
      <p>
        The restaurant menu is on the live Popmenu site — not inside this Pixel lab page. Continuity
        only keeps a digest map.
      </p>
      <a href="https://www.mcflamingo.com/menu">Open live menu</a>
      <a class="ghost" href="https://www.mcflamingo.com/popmenu-order">Order on Popmenu</a>
      <a class="ghost" href="https://www.mcflamingo.com/">Homepage</a>
    </main>
    <script>
      location.replace("https://www.mcflamingo.com/menu");
    </script>
  </body>
</html>
