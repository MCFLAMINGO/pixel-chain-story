name: ci

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin — `latest` has caused surprise CI breaks; match local/dev.
          bun-version: "1.3.14"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Protocol selftests
        run: bun run test:all
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Foundry ULAVerifier
        run: forge test
      - name: CosmWasm ULA twin
        run: cargo test --manifest-path contracts/cosmwasm/ula-verifier/Cargo.toml
      - name: Relayer Locked → shineIn (anvil)
        run: bun run test:ula-relayer
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
