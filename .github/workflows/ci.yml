name: ci

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pin — `latest` has caused surprise CI breaks; match local/dev.
          bun-version: "1.3.14"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Protocol selftests
        run: bun run test:all
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
