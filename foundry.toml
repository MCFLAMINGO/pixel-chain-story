[profile.default]
src = "contracts"
out = "contracts/out"
libs = ["contracts/lib"]
test = "contracts/test"
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./fixtures" }, { access = "read", path = "./contracts" }]

[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
